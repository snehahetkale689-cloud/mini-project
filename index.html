<!DOCTYPE html>
<html>
<head>
    <title>Skill Gap Analyzer</title>

   <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        background: url("https://www.riseup.ai/hubfs/Skills%20gap.jpg") no-repeat center/cover;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Container hidden initially */
    .container {
        width: 500px;
        padding: 60px;
        border-radius: 20px;

        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);

        box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        color: white;
        text-align: center;

        opacity: 0;
        transform: translateY(30px);
        animation: fadeIn 1s ease forwards;
        animation-delay: 1.5s; /* ⏳ delay */
    }

    @keyframes fadeIn {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    input, select {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 8px;
        border: none;
        outline: none;
    }

    button {
        
        padding: 10px 20px;
        border-radius: 25px;
        border: none;
        background: linear-gradient(to right, #6a11cb, #2575fc);
        color: white;
        font-size: 16px;
        cursor: pointer;
    }
    button:hover{
        transform:scale(1.05);
        box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
    }
</style>

</head>

<body>

<div class="container">

<h2>Skill Gap Analyzer</h2>

<form action="/analyze" method="POST">

<label>Enter Name:</label><br>
<input type="text" name="name" required><br>

<label>Select Career Role:</label><br>

<select name="career">



<option>Software Developer</option>
<option>Frontend Developer</option>
<option>Backend Developer</option>
<option>Full stack Developer</option>
<option>Machine learning Engineer</option>
<option>Data Analyst</option>
<option>Cyber Security Analyst</option>
<option>Cloud Engineer</option>
<option>DevOps Engineer</option>
<option>AI Engineer</option>
<option>Network Engineer</option>
<option>Mobile App Developer</option>
<option>web developer</option></select><br><br>


<label>Enter Your Technical Skills (comma separated)</label><br>

<input type="text" name="skills" placeholder="Example: HTML, Python, CSS"><br>

<button type="submit">Analyze Skills</button>

</form>

</div>

</body>
</html>
